<head>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Warhammer 40k 11th Edition — Detachment &amp; Mission Dashboard</title>
<style>
  :root {
    --bg: #0c0b09;
    --panel: #16140f;
    --panel-2: #1d1a14;
    --border: #2e2a20;
    --gold: #c9a84c;
    --gold-dim: #8a7434;
    --text: #d6d2c8;
    --muted: #8d887c;
    /* disposition colors */
    --c-tah: #c9a84c;   /* Take and Hold — gold */
    --c-ptf: #c0504a;   /* Purge the Foe — red */
    --c-dis: #9a6bbf;   /* Disruption — purple */
    --c-rec: #6fa86a;   /* Reconnaissance — green */
    --c-pa:  #5e8fb8;   /* Priority Assets — blue */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.35rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 4px;
    font-weight: 600;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin: 0 0 22px;
    letter-spacing: 0.04em;
  }
  .layout {
    display: grid;
    grid-template-columns: 1.2fr 2fr;
    grid-template-areas:
      "faction right"
      "table   right";
    grid-template-rows: auto 1fr;
    gap: 24px;
    align-items: start;
    max-width: 1280px;
  }
  .faction-area { grid-area: faction; }
  .table-wrap { grid-area: table; }
  .right { grid-area: right; }
  label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }
  select {
    width: 100%;
    padding: 12px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 1rem; /* >=16px prevents iOS focus auto-zoom */
    cursor: pointer;
  }
  select:focus { outline: 1px solid var(--gold-dim); }

  /* right side: nested grid so cards sit under dropdowns 2 & 3 */
  .right {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 24px;
    align-items: start;
  }
  .matchup-note {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    font-style: italic;
    font-size: 0.92rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
  }
  .matchup-note strong { color: var(--gold); font-style: normal; }
  .mission-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    text-align: center;
  }
  .mission-card .who {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold-dim);
    margin-bottom: 4px;
  }
  .mission-card .mission-name {
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 10px;
    min-height: 1.3em;
  }
  .mission-card .side-tag {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 7px;
    margin-left: 8px;
    vertical-align: middle;
    white-space: nowrap;
  }
  .mission-card img {
    width: 100%;
    height: auto;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: block;
    background: var(--panel-2);
    min-height: 120px;
  }

  /* 3D flip — click a card to see the physical reverse side */
  .flip {
    perspective: 1400px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .flip-inner {
    position: relative;
    transition: transform 0.55s cubic-bezier(0.2, 0.7, 0.2, 1);
    transform-style: preserve-3d;
  }
  .flip.flipped .flip-inner { transform: rotateY(180deg); }
  .face {
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
  }
  .face-back {
    position: absolute;
    inset: 0;
    transform: rotateY(180deg);
  }
  .flip:focus-visible {
    outline: 2px solid var(--gold-dim);
    outline-offset: 4px;
    border-radius: 5px;
  }
  .mission-card.single-sided .flip { cursor: default; }
  .flip-hint {
    margin-top: 8px;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    user-select: none;
  }
  @media (prefers-reduced-motion: reduce) {
    .flip-inner { transition: none; }
  }

  .mission-card .img-error {
    display: none;
    padding: 30px 10px;
    color: var(--muted);
    font-size: 0.85rem;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  /* detachment table */
  .table-wrap {
    margin-top: -8px; /* tighten the 24px grid gap under the faction dropdown */
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  th {
    text-align: left;
    padding: 9px 12px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold-dim);
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
    font-weight: 600;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(46, 42, 32, 0.5);
  }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: rgba(201, 168, 76, 0.07); }
  tbody tr:last-child td { border-bottom: none; }
  td.dp { text-align: center; color: var(--muted); }
  th.dp { text-align: center; }
  .pill {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    border: 1px solid;
    white-space: nowrap;
  }
  .pill.tah { color: var(--c-tah); border-color: var(--c-tah); background: rgba(201,168,76,0.10); }
  .pill.ptf { color: var(--c-ptf); border-color: var(--c-ptf); background: rgba(192,80,74,0.10); }
  .pill.dis { color: var(--c-dis); border-color: var(--c-dis); background: rgba(154,107,191,0.10); }
  .pill.rec { color: var(--c-rec); border-color: var(--c-rec); background: rgba(111,168,106,0.10); }
  .pill.pa  { color: var(--c-pa);  border-color: var(--c-pa);  background: rgba(94,143,184,0.10); }

  @media (max-width: 700px) {
    body { padding: 16px; }
    /* missions above the long detachment table on phones */
    .layout {
      grid-template-columns: 1fr;
      grid-template-areas:
        "faction"
        "right"
        "table";
      grid-template-rows: auto;
    }
    .right { grid-template-columns: 1fr; }
    .matchup-note { grid-column: 1; }
    .table-wrap { margin-top: 0; }
  }
</style>
</head>

const cardUrl = (disp, mission) =>
  `https://gdmissions.app/assets/11th/primary-missions/${slug(disp)}/${slug(mission)}.png`;

const factionSel = document.getElementById("faction");
const yourSel = document.getElementById("your-disp");
const oppSel = document.getElementById("opp-disp");
const rowsEl = document.getElementById("detachment-rows");

for (const f of Object.keys(FACTIONS)) {
  factionSel.add(new Option(f, f));
}
for (const d of DISPOSITIONS) {
  yourSel.add(new Option(d, d));
  oppSel.add(new Option(d, d));
}

function renderTable() {
  rowsEl.innerHTML = "";
  for (const [name, dp, disp] of FACTIONS[factionSel.value]) {
    const tr = document.createElement("tr");

    const tdName = document.createElement("td");
    tdName.textContent = name;
    const tdDp = document.createElement("td");
    tdDp.className = "dp";
    tdDp.textContent = dp;
    const tdDisp = document.createElement("td");
    const pill = document.createElement("span");
    pill.className = "pill " + PILL_CLASS[disp];
    pill.textContent = disp;
    tdDisp.appendChild(pill);

    tr.append(tdName, tdDp, tdDisp);
    tr.addEventListener("click", () => {
      yourSel.value = disp;
      renderMissions();
    });
    rowsEl.appendChild(tr);
  }
}

// Each physical primary mission card is double-sided: the front is one player's
// mission for a matchup, the back is the opposing player's mission for that same
// matchup (the reverse-matrix lookup). Mirror matchups are identical on both
// sides, so those cards have no distinct second side.
const CARDS = {
  your: { card: "your-card", flip: "your-flip", name: "your-mission-name", hint: "your-flip-hint", err: "your-img-error", front: "your-mission-img", back: "your-mission-img-back" },
  opp:  { card: "opp-card",  flip: "opp-flip",  name: "opp-mission-name",  hint: "opp-flip-hint",  err: "opp-img-error",  front: "opp-mission-img",  back: "opp-mission-img-back" }
};

function nameWithTag(text, tag) {
  const span = document.createElement("span");
  span.textContent = text;
  if (tag) {
    const t = document.createElement("span");
    t.className = "side-tag";
    t.textContent = tag;
    span.appendChild(t);
  }
  return span;
}

function setName(nameEl, text, tag) {
  nameEl.replaceChildren(nameWithTag(text, tag));
}

function setCard(key, frontDisp, frontMission, backDisp, backMission) {
  const c = CARDS[key];
  const card = document.getElementById(c.card);
  const flip = document.getElementById(c.flip);
  const nameEl = document.getElementById(c.name);
  const hint = document.getElementById(c.hint);
  const err = document.getElementById(c.err);
  const frontImg = document.getElementById(c.front);
  const backImg = document.getElementById(c.back);

  const singleSided = frontMission === backMission; // mirror matchup

  // reset to the front side on every (re)render
  flip.classList.remove("flipped");
  flip.setAttribute("aria-pressed", "false");
  card.classList.toggle("single-sided", singleSided);

  // stash state for the flip toggle
  flip.dataset.front = frontMission;
  flip.dataset.back = backMission;
  flip.dataset.single = singleSided ? "1" : "";

  setName(nameEl, frontMission);
  hint.textContent = singleSided ? "Same on both sides (mirror)" : "Tap to flip ⟳";

  err.style.display = "none";
  flip.style.display = "";
  frontImg.style.display = "";
  frontImg.onerror = () => { flip.style.display = "none"; hint.style.display = "none"; err.style.display = "block"; };
  frontImg.onload = () => { hint.style.display = ""; };
  frontImg.src = cardUrl(frontDisp, frontMission);
  backImg.onerror = () => { backImg.style.display = "none"; };
  backImg.style.display = "";
  backImg.src = cardUrl(backDisp, backMission);
}

function toggleFlip(key) {
  const c = CARDS[key];
  const flip = document.getElementById(c.flip);
  if (flip.dataset.single) return; // mirror card — no distinct reverse
  const nameEl = document.getElementById(c.name);
  const hint = document.getElementById(c.hint);
  const flipped = flip.classList.toggle("flipped");
  flip.setAttribute("aria-pressed", flipped ? "true" : "false");
  if (flipped) {
    setName(nameEl, flip.dataset.back, "reverse");
    hint.textContent = "Reverse side ⟲ tap to flip back";
  } else {
    setName(nameEl, flip.dataset.front);
    hint.textContent = "Tap to flip ⟳";
  }
}

for (const key of Object.keys(CARDS)) {
  const flip = document.getElementById(CARDS[key].flip);
  flip.addEventListener("click", () => toggleFlip(key));
  flip.addEventListener("keydown", e => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggleFlip(key); }
  });
}

function renderMissions() {
  const yours = yourSel.value;
  const opp = oppSel.value;
  const yourMission = MATRIX[yours][opp];
  const oppMission = MATRIX[opp][yours];

  const note = document.getElementById("matchup-note");
  if (yours === opp) {
    note.innerHTML = `Mirror matchup — both players play <strong></strong>`;
    note.querySelector("strong").textContent = yourMission;
  } else {
    note.innerHTML = `<strong></strong> vs <strong></strong> — each player scores their own primary mission.`;
    const strongs = note.querySelectorAll("strong");
    strongs[0].textContent = yours;
    strongs[1].textContent = opp;
  }

  // front = this player's mission; back = the opposing mission for the same matchup
  setCard("your", yours, yourMission, opp, oppMission);
  setCard("opp", opp, oppMission, yours, yourMission);
}

factionSel.addEventListener("change", renderTable);
yourSel.addEventListener("change", renderMissions);
oppSel.addEventListener("change", renderMissions);

renderTable();
renderMissions();
</script>
</body>
</html>
