<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0c0b09">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="40k Missions">
<meta name="description" content="Warhammer 40,000 11th edition detachment &amp; primary mission dashboard — pick both force dispositions and see each player's primary mission card.">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.json">
<title>Warhammer 40k 11th Edition — Detachment &amp; Mission Dashboard</title>
<style>
  :root {
    --bg: #0c0b09;
    --panel: #16140f;
    --panel-2: #1d1a14;
    --border: #2e2a20;
    --gold: #c9a84c;
    --gold-dim: #8a7434;
    --text: #d6d2c8;
    --muted: #8d887c;
    /* disposition colors */
    --c-tah: #c9a84c;   /* Take and Hold — gold */
    --c-ptf: #c0504a;   /* Purge the Foe — red */
    --c-dis: #9a6bbf;   /* Disruption — purple */
    --c-rec: #6fa86a;   /* Reconnaissance — green */
    --c-pa:  #5e8fb8;   /* Priority Assets — blue */
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: Georgia, "Times New Roman", serif;
    min-height: 100vh;
  }
  h1 {
    font-size: 1.35rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    margin: 0 0 4px;
    font-weight: 600;
  }
  .subtitle {
    color: var(--muted);
    font-size: 0.85rem;
    margin: 0 0 22px;
    letter-spacing: 0.04em;
  }
  .layout {
    display: grid;
    grid-template-columns: 1.2fr 2fr;
    grid-template-areas:
      "faction right"
      "table   right";
    grid-template-rows: auto 1fr;
    gap: 24px;
    align-items: start;
    max-width: 1280px;
  }
  .faction-area { grid-area: faction; }
  .table-wrap { grid-area: table; }
  .right { grid-area: right; }
  label {
    display: block;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold-dim);
    margin-bottom: 6px;
  }
  select {
    width: 100%;
    padding: 12px;
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: inherit;
    font-size: 1rem; /* >=16px prevents iOS focus auto-zoom */
    cursor: pointer;
  }
  select:focus { outline: 1px solid var(--gold-dim); }

  /* right side: nested grid so cards sit under dropdowns 2 & 3 */
  .right {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px 24px;
    align-items: start;
  }
  .matchup-note {
    grid-column: 1 / -1;
    text-align: center;
    color: var(--muted);
    font-style: italic;
    font-size: 0.92rem;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    padding: 8px 0;
  }
  .matchup-note strong { color: var(--gold); font-style: normal; }
  .mission-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px;
    text-align: center;
  }
  .mission-card .who {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--gold-dim);
    margin-bottom: 4px;
  }
  .mission-card .mission-name {
    font-size: 1.1rem;
    color: var(--gold);
    margin-bottom: 10px;
  }
  .mission-card img {
    width: 100%;
    height: auto;
    border-radius: 4px;
    border: 1px solid var(--border);
    display: block;
    background: var(--panel-2);
    min-height: 120px;
  }
  .mission-card .img-error {
    display: none;
    padding: 30px 10px;
    color: var(--muted);
    font-size: 0.85rem;
    border: 1px dashed var(--border);
    border-radius: 4px;
  }

  /* detachment table */
  .table-wrap {
    margin-top: -8px; /* tighten the 24px grid gap under the faction dropdown */
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  th {
    text-align: left;
    padding: 9px 12px;
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--gold-dim);
    border-bottom: 1px solid var(--border);
    background: var(--panel-2);
    font-weight: 600;
  }
  td {
    padding: 8px 12px;
    border-bottom: 1px solid rgba(46, 42, 32, 0.5);
  }
  tbody tr { cursor: pointer; }
  tbody tr:hover { background: rgba(201, 168, 76, 0.07); }
  tbody tr:last-child td { border-bottom: none; }
  td.dp { text-align: center; color: var(--muted); }
  th.dp { text-align: center; }
  .pill {
    display: inline-block;
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 0.72rem;
    letter-spacing: 0.03em;
    border: 1px solid;
    white-space: nowrap;
  }
  .pill.tah { color: var(--c-tah); border-color: var(--c-tah); background: rgba(201,168,76,0.10); }
  .pill.ptf { color: var(--c-ptf); border-color: var(--c-ptf); background: rgba(192,80,74,0.10); }
  .pill.dis { color: var(--c-dis); border-color: var(--c-dis); background: rgba(154,107,191,0.10); }
  .pill.rec { color: var(--c-rec); border-color: var(--c-rec); background: rgba(111,168,106,0.10); }
  .pill.pa  { color: var(--c-pa);  border-color: var(--c-pa);  background: rgba(94,143,184,0.10); }

  @media (max-width: 700px) {
    body { padding: 16px; }
    /* missions above the long detachment table on phones */
    .layout {
      grid-template-columns: 1fr;
      grid-template-areas:
        "faction"
        "right"
        "table";
      grid-template-rows: auto;
    }
    .right { grid-template-columns: 1fr; }
    .matchup-note { grid-column: 1; }
    .table-wrap { margin-top: 0; }
  }
</style>
</head>
<body>
  <h1>Detachment &amp; Mission Dashboard</h1>
  <p class="subtitle">Warhammer 40,000 — 11th Edition &middot; Chapter Approved 2026</p>

  <div class="layout">
    <div class="faction-area">
      <label for="faction">Faction</label>
      <select id="faction"></select>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr><th>Detachment</th><th class="dp">DP</th><th>Force Disposition</th></tr>
        </thead>
        <tbody id="detachment-rows"></tbody>
      </table>
    </div>

    <div class="right">
      <div>
        <label for="your-disp">Your Force Disposition</label>
        <select id="your-disp"></select>
      </div>
      <div>
        <label for="opp-disp">Opponent's Force Disposition</label>
        <select id="opp-disp"></select>
      </div>

      <div class="matchup-note" id="matchup-note"></div>

      <div class="mission-card">
        <div class="who">Your Primary Mission</div>
        <div class="mission-name" id="your-mission-name"></div>
        <img id="your-mission-img" alt="Your primary mission card">
        <div class="img-error" id="your-img-error">Card image unavailable</div>
      </div>
      <div class="mission-card">
        <div class="who">Opponent's Primary Mission</div>
        <div class="mission-name" id="opp-mission-name"></div>
        <img id="opp-mission-img" alt="Opponent's primary mission card">
        <div class="img-error" id="opp-img-error">Card image unavailable</div>
      </div>

const PILL_CLASS = {
  "Take and Hold": "tah",
  "Purge the Foe": "ptf",
  "Disruption": "dis",
  "Reconnaissance": "rec",
  "Priority Assets": "pa"
};

const slug = s => s.toLowerCase().replace(/'/g, "").replace(/ /g, "-");
const cardUrl = (disp, mission) =>
  `https://gdmissions.app/assets/11th/primary-missions/${slug(disp)}/${slug(mission)}.png`;

const factionSel = document.getElementById("faction");
const yourSel = document.getElementById("your-disp");
const oppSel = document.getElementById("opp-disp");
const rowsEl = document.getElementById("detachment-rows");

for (const f of Object.keys(FACTIONS)) {
  factionSel.add(new Option(f, f));
}
for (const d of DISPOSITIONS) {
  yourSel.add(new Option(d, d));
  oppSel.add(new Option(d, d));
}

function renderTable() {
  rowsEl.innerHTML = "";
  for (const [name, dp, disp] of FACTIONS[factionSel.value]) {
    const tr = document.createElement("tr");

    const tdName = document.createElement("td");
    tdName.textContent = name;
    const tdDp = document.createElement("td");
    tdDp.className = "dp";
    tdDp.textContent = dp;
    const tdDisp = document.createElement("td");
    const pill = document.createElement("span");
    pill.className = "pill " + PILL_CLASS[disp];
    pill.textContent = disp;
    tdDisp.appendChild(pill);

    tr.append(tdName, tdDp, tdDisp);
    tr.addEventListener("click", () => {
      yourSel.value = disp;
      renderMissions();
    });
    rowsEl.appendChild(tr);
  }
}

function setCard(imgId, errId, nameId, disp, mission) {
  document.getElementById(nameId).textContent = mission;
  const img = document.getElementById(imgId);
  const err = document.getElementById(errId);
  img.style.display = "";
  err.style.display = "none";
  img.onerror = () => { img.style.display = "none"; err.style.display = "block"; };
  img.src = cardUrl(disp, mission);
}

function renderMissions() {
  const yours = yourSel.value;
  const opp = oppSel.value;
  const yourMission = MATRIX[yours][opp];
  const oppMission = MATRIX[opp][yours];

  const note = document.getElementById("matchup-note");
  if (yours === opp) {
    note.innerHTML = `Mirror matchup — both players play <strong></strong>`;
    note.querySelector("strong").textContent = yourMission;
  } else {
    note.innerHTML = `<strong></strong> vs <strong></strong> — each player scores their own primary mission.`;
    const strongs = note.querySelectorAll("strong");
    strongs[0].textContent = yours;
    strongs[1].textContent = opp;
  }

  setCard("your-mission-img", "your-img-error", "your-mission-name", yours, yourMission);
  setCard("opp-mission-img", "opp-img-error", "opp-mission-name", opp, oppMission);
}

factionSel.addEventListener("change", renderTable);
yourSel.addEventListener("change", renderMissions);
oppSel.addEventListener("change", renderMissions);

renderTable();
renderMissions();
